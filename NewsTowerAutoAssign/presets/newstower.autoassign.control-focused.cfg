## Preset: most manual control, safest news only (copy into BepInEx/config/newstower.autoassign.cfg)
## Only auto-assigns news that are not risky, have one obvious path, and a reporter is free in that moment.
## You handle discarding news, assigning ads, risky stories, and everything else.

[Dev]

AutoAssignAds = false
AutoAssignOnlyObviousPath = true
AutoResolveBribes = false
AutoSkipRiskPopups = false
AutoSkipSuitcasePopups = false
AvoidRisks = true
ChaseGoals = false
DiscardFreshStoriesOnWeekend = false
DiscardIfNoReporterForHours = 0 # 0 = disabled
Enabled = true
GlobePinOwnershipEnabled = true
MinReportersToActivate = 4
